<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Asif — IT Capitals</title>
  <meta name="description" content="Asif — IT Capitals">
  <link rel="icon" type="image/png" href="../images/fulllogo_transparent_nobuffer.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --line: rgba(255,255,255,0.12);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.66);
      --max: 1120px;
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: #000;
      color: var(--text);
      line-height: 1.6;
    }
    img { display: block; max-width: 100%; height: auto; }
    a { color: inherit; text-decoration: none; }
    .container {
      width: min(calc(100% - 32px), var(--max));
      margin: 0 auto;
    }
    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .header-inner {
      min-height: 82px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .brand img {
      width: 188px;
      max-width: 48vw;
      filter: brightness(0) invert(1);
    }
    .hero {
      padding: 88px 0 72px;
    }
    .hero-inner {
      max-width: 760px;
    }
    h1 {
      margin: 0;
      font-size: clamp(2.8rem, 9vw, 6.3rem);
      line-height: 0.95;
      letter-spacing: -0.06em;
      font-weight: 800;
      text-transform: uppercase;
    }
    .lead {
      margin: 24px 0 0;
      max-width: 34ch;
      color: var(--muted);
      font-size: clamp(1rem, 1.4vw, 1.08rem);
    }
    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 30px;
    }
    .btn {
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      border: 1px solid var(--line);
      background: transparent;
      color: #fff;
    }
    .footer {
      padding: 34px 0 40px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .footer-note {
      color: var(--muted);
      font-size: 14px;
      margin: 0;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="/" aria-label="IT Capitals home">
        <img src="../images/fulllogo_transparent_nobuffer_edited_1.png" alt="IT Capitals logo" width="188" height="58">
      </a>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container hero-inner">
        <h1>Asif</h1>
        <p class="lead">
          Digital assets, blockchain, and strategic technology — approached quietly, precisely, and with intention.
        </p>
        <div class="hero-actions">
          <a class="btn" href="mailto:asif@itcapitals.com">Text</a>
          <a class="btn" href="tel:4372233792">Talk</a>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p class="footer-note">&copy; IT Capitals 2026</p>
    </div>
  </footer>
</body>
</html>
