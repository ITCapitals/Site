<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IT Capitals</title>
  <meta name="description" content="IT Capitals">
  <link rel="icon" type="image/png" href="images/fulllogo_transparent_nobuffer.png">
  <link rel="apple-touch-icon" href="images/fulllogo_transparent_nobuffer.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --surface: #0b0b0b;
      --line: rgba(255,255,255,0.12);
      --line-strong: rgba(255,255,255,0.24);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.66);
      --soft: rgba(255,255,255,0.08);
      --max: 1120px;
      --radius: 24px;
    }

    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: #000;
      color: var(--text);
      line-height: 1.6;
    }

    img { display: block; max-width: 100%; height: auto; }
    a { color: inherit; text-decoration: none; }

    .skip-link {
      position: absolute;
      left: -9999px;
      top: 0;
    }
    .skip-link:focus {
      left: 16px;
      top: 16px;
      background: #fff;
      color: #000;
      padding: 10px 14px;
      border-radius: 10px;
      z-index: 1000;
    }

    .container {
      width: min(calc(100% - 32px), var(--max));
      margin: 0 auto;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .header-inner {
      min-height: 82px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      min-height: 44px;
    }

    .brand img {
      width: 188px;
      max-width: 48vw;
      filter: brightness(0) invert(1);
    }

    .header-link {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 14px;
      color: var(--muted);
    }

    .hero {
      position: relative;
      padding: 88px 0 72px;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -40px;
      bottom: -30px;
      width: min(42vw, 420px);
      height: min(42vw, 420px);
      background: url('images/fulllogo_transparent_nobuffer.png') center/contain no-repeat;
      opacity: 0.05;
      filter: brightness(0) invert(1);
      pointer-events: none;
    }

    .hero-inner {
      max-width: 760px;
      position: relative;
      z-index: 1;
    }

    .kicker {
      display: inline-block;
      margin-bottom: 20px;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.8rem, 9vw, 6.3rem);
      line-height: 0.95;
      letter-spacing: -0.06em;
      font-weight: 800;
      text-transform: uppercase;
    }

    .lead {
      margin: 24px 0 0;
      max-width: 34ch;
      color: var(--muted);
      font-size: clamp(1rem, 1.4vw, 1.08rem);
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 30px;
    }

    .btn {
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      border: 1px solid var(--line);
    }

    .btn-primary {
      background: #fff;
      color: #000;
      border-color: #fff;
    }

    .btn-secondary {
      background: transparent;
      color: #fff;
    }

    .footer {
      padding: 34px 0 40px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .footer-box {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: end;
      padding-top: 10px;
    }

    .footer-title {
      margin: 0 0 14px;
      font-size: 0.9rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
    }

    .footer-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .footer-links a {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: #fff;
      font-size: 14px;
    }

    .footer-note {
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .footer-logo {
      width: 170px;
      max-width: 44vw;
      filter: brightness(0) invert(1);
      opacity: 0.9;
    }

    @media (max-width: 720px) {
      .header-inner,
      .footer-box {
        grid-template-columns: 1fr;
        display: grid;
      }

      .header-link,
      .btn,
      .footer-links a {
        width: 100%;
      }

      .hero {
        padding: 64px 0 54px;
      }

      .hero-actions,
      .footer-links {
        flex-direction: column;
      }

      .brand img {
        width: 156px;
        max-width: 56vw;
      }

      .footer-logo {
        width: 150px;
      }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="#" aria-label="IT Capitals home">
        <img src="images/fulllogo_transparent_nobuffer.png" alt="IT Capitals logo" width="188" height="58">
      </a>
    </div>
  </header>

  <main id="main">
    <section class="hero">
      <div class="container hero-inner">
        <h1>Yes.</h1>
        <div class="hero-actions">
          <a class="btn btn-primary" href="mailto:asif@itcapitals.com">Text</a>
          <a class="btn btn-secondary" href="tel:4372233792">Talk</a>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-box">
      </div>
        <p class="footer-note">© ITCapitals 2026</p>
      </div>
      <img class="footer-logo" src="images/fulllogo_transparent_nobuffer.png" alt="IT Capitals footer logo" width="170" height="60" loading="lazy">
    </div>
  </footer>
</body>
</html>
