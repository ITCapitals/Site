<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ITCapitals</title>
  <link rel="icon" type="image/png" href="./images/fulllogo_transparent_nobuffer.png" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .watermark {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 0;
    }

    .watermark img {
      width: min(70vw, 520px);
      opacity: 0.08;
      filter: grayscale(100%) brightness(1.3);
    }

    .container {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      text-align: center;
    }

    .logo {
      width: min(220px, 52vw);
      margin-bottom: 40px;
      filter: grayscale(100%) brightness(1.2);
    }

    .statement {
      font-size: clamp(28px, 5vw, 54px);
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 36px;
      max-width: 900px;
    }

    .actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 220px;
      padding: 14px 24px;
      border: 1px solid #fff;
      color: #fff;
      text-decoration: none;
      background: transparent;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.3px;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .btn:hover {
      background: #fff;
      color: #000;
    }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 18px 20px 24px;
      font-size: 14px;
      color: #d0d0d0;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
    }

    @media (max-width: 640px) {
      .container {
        padding: 32px 16px;
      }

      .statement {
        margin-bottom: 28px;
      }

      .actions {
        flex-direction: column;
        width: 100%;
        max-width: 320px;
      }

      .btn {
        width: 100%;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <div class="watermark">
    <img src="./images/fulllogo_transparent_nobuffer.png" alt="" />
  </div>

  <main class="container">
    <img
      class="logo"
      src="./images/fulllogo_transparent_nobuffer.png"
      alt="ITCapitals logo"
    />

    <h1 class="statement">YES.</h1>

    <div class="actions">
      <a class="btn" href="tel:+14372233792">Call (+14372233792)</a>
      <a class="btn" href="mailto:asif@itcapitals.com">E-mail</a>
    </div>
  </main>

  <footer>
    © ITCapitals 2026
  </footer>
</body>
</html>
